<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TransitOps — Smart Transport Operations Platform for fleet management, trip dispatch, maintenance tracking, and financial analytics.">
  <title>TransitOps — Smart Transport Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/styles.css?v=8">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#logo-grad)"/>
            <path d="M14 18h20M14 24h20M14 30h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="36" cy="30" r="4" fill="white" opacity="0.8"/>
            <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
        </div>
        <h1>TransitOps</h1>
        <p class="login-subtitle">Smart Transport Operations Platform</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="fleet@transitops.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div id="login-error" class="login-error" style="display:none;"></div>
      </form>
      <div class="login-demo-accounts">
        <p>Demo Accounts <span class="text-muted">(Password: password123)</span></p>
        <div class="demo-chips">
          <button class="demo-chip" data-email="fleet.manager@demo.com" onclick="fillLogin(this)">Fleet Manager</button>
          <button class="demo-chip" data-email="dispatcher@demo.com" onclick="fillLogin(this)">Dispatcher</button>
          <button class="demo-chip" data-email="safety@demo.com" onclick="fillLogin(this)">Safety Officer</button>
          <button class="demo-chip" data-email="finance@demo.com" onclick="fillLogin(this)">Analyst</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App Shell -->
  <div id="app-shell" class="app-shell" style="display:none;">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#sb-grad)"/><path d="M9 12h14M9 16h14M9 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="20" r="3" fill="white" opacity="0.8"/><defs><linearGradient id="sb-grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
        </div>
        <span class="brand-text">TransitOps</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="vehicles" id="nav-vehicles">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="22" height="12" rx="2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><path d="M5 6V4a1 1 0 011-1h4l2 3"/></svg>
          <span>Fleet</span>
        </a>
        <a href="#" class="nav-item" data-page="drivers" id="nav-drivers">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Drivers</span>
        </a>
        <a href="#" class="nav-item" data-page="compliance" id="nav-compliance">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>Compliance</span>
        </a>
        <a href="#" class="nav-item" data-page="trips" id="nav-trips">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>Trips</span>
        </a>
        <a href="#" class="nav-item" data-page="maintenance" id="nav-maintenance">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          <span>Maintenance</span>
        </a>
        <a href="#" class="nav-item" data-page="fuel" id="nav-fuel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 22V6a2 2 0 012-2h8a2 2 0 012 2v16"/><path d="M15 10h2a2 2 0 012 2v2a2 2 0 002 2h0a2 2 0 002-2V9.83a2 2 0 00-.59-1.42L18 5"/><path d="M7 2v4M11 2v4"/></svg>
          <span>Fuel & Expenses</span>
        </a>
        <a href="#" class="nav-item" data-page="reports" id="nav-reports">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
          <span>Analytics</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">FM</div>
          <div class="user-details">
            <span class="user-name" id="user-name">User</span>
            <span class="user-role" id="user-role">Role</span>
          </div>
        </div>
        <button class="btn-icon" onclick="logout()" title="Sign Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="btn-icon sidebar-toggle" onclick="toggleSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <h2 id="page-title" class="page-title">Dashboard</h2>
        </div>
        <div class="top-bar-right">
          <div class="search-box" id="global-search-box" style="display:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="global-search" placeholder="Search...">
          </div>
          <div class="notification-bell" id="expiry-badge" style="display:none;" title="Expiring licenses">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notification-badge" id="expiry-count">0</span>
          </div>
        </div>
      </header>
      <div id="page-content" class="page-content content-body">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-container" class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="btn-icon modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/permissions.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/vehicles.js"></script>
  <script src="/js/pages/drivers.js"></script>
  <script src="/js/pages/compliance.js"></script>
  <script src="/js/pages/trips.js"></script>
  <script src="/js/pages/maintenance.js"></script>
  <script src="/js/pages/fuel.js"></script>
  <script src="/js/pages/reports.js"></script>
</body>
</html>
